body:
  text: 癸西十月編録弘一甲乙丙丁戊己庚辛壬癸子丑寅初題號初標題二撰號初喻勸二本文初標勸初勸機二正勸二偈二述撰意初標章牒經題初徵二正明初標分初申經意門初舉發心德初總標二釋題為經意二釋初舉三聚心初標分二別釋二正明二能所成門初標章引文初正述能成由二結至丈夫二正明初能成相門二依文述意初徵初舉喻二徵釋能成心二釋外徵難初舉大心得二釋二合法初舉喻二述小心失初明禮初發心二合法三引經證成二明名最無上初正述二所成相門初標章引文初說菩薩戒相初一切受得二依文述意初總標初標二引證二對餘明不同初受不同分相初引經二別釋二犯不同分相二釋二亦有自受初標章三捨不同分相二立義三修行差別門初述義初顯著撰意二解釋初標列初標科引經三現身受二引證三總結二被同趣入二正明初親近善士門三會遠三總結漏修二定善友體初泛列四友二局同初友初正取二聽聞正法門初標科三親善友意二述由二引釋初引經勸聞法二勸正念聞法初正勸三如理作意門初標分三勸聞法流通二牒釋初諸行無常二引證二有漏皆苦初空遍計所執三三界不淨二觀依他如幻初護正念門四如說修行門初標章四諸法無我三觀圓成實性二波羅密多攝門二解釋初總標初徵列三輕重性門二別釋二正明四持犯相門癸子丑寅卯辰三總勸初勸修中二引經證初標章初總標二犯不同分相初引論初泛列四句初人四句巳午未二正明二別列二解釋二行四句申酉初因句結論不同初立義二取能用句初舉瑜伽論意初正明初徵戌二準明性罪現行二徵引二頌亦通下凡初舉疑二引證二決名初正決二決疑初正例在家二引例初問二決遮出家初正決疑二答二釋引例癸子丑寅卯辰巳午未申酉初標章初正明大小不同初捨緣多少初正明三捨不同分相二犯重捨否二引證二解釋初正明三總捨別捨初引文二引證初立義初引對法意例初立義二解釋初以犯不失性例證二引本業文證四命終捨否二例證初立義初引文二引證初引瑜伽章二以一分受持例證初引涅槃經二準例子丑寅二因決別受八戒初正問初決答二引本業文二例證二正答二引證二引本業經初標章卯初舉疑初護正念門三轉問初世尊說二正明初對可愛境二引違二資不解初觀他本性四結答初義答初例二對相違境二引證二證二親自往事辰三在中答時初正轉流轉二述佛教意巳午二波羅密多攝門初標分三思惟臥相初正明二別釋初總性攝門初依唯識論二引證二依瑜伽論初自然還修一切行三輕重性門初標章二別相攝門初總標二於一行中修一切初互相資助故初立義二述解初總標二別釋三於一切行修一切行二攝在剎那故二引證二別解初標根本重初別彰初攝律儀戒本初舉極遠四持犯相門初標分二彰三聚本二總結二攝善法戒本二合四戒二牒釋初總相門初決作不作初問三饒益有情戒本初舉極遠二答二合四戒二決染不染初問二答三決犯與罪初問二答四決罪與業初問二答初正答五決重業異捨初問二轉問未申酉二答三答通二別相門初標章初決讚毀罪福初問初標句二述解初約自讚毀他解二答二出句四二決讚毀他勝處初問初標句初出初句二令所餘類準初正令類準二答二出句二指餘句二述類準意初明應塵機行別三究竟門初標章二明應塵修皆是二述解初護持初述意引文三明謗法故戒緩初述意二空三輪相初正明不可得初增上求心二引證二懺悔初例護持二明離增減執初正明初述意二引文證三明究竟名二徵釋二增下化心二引證
